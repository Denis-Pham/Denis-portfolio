<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="Segoe UI, Arial, sans-serif">
  <rect width="640" height="400" fill="#fafaf9"/>
  <rect width="640" height="48" fill="#ffffff"/>
  <line x1="0" y1="48" x2="640" y2="48" stroke="#e6e4e0" stroke-width="2"/>
  <circle cx="28" cy="24" r="10" fill="#7c3aed"/>
  <rect x="48" y="17" width="190" height="14" rx="4" fill="#1c1b1a" opacity="0.85"/>
  <!-- scatter panel -->
  <rect x="24" y="68" width="592" height="308" rx="10" fill="#ffffff" stroke="#e6e4e0"/>
  <!-- axes -->
  <line x1="80" y1="100" x2="80" y2="340" stroke="#d6d4d0" stroke-width="2"/>
  <line x1="80" y1="340" x2="580" y2="340" stroke="#d6d4d0" stroke-width="2"/>
  <text x="300" y="368" font-size="13" fill="#6b6964">Sales →</text>
  <text x="46" y="220" font-size="13" fill="#6b6964" transform="rotate(-90 46 220)">KPI →</text>
  <!-- flagged quadrant: low sales, high KPI -->
  <rect x="81" y="100" width="180" height="110" fill="#fef3c7" opacity="0.65"/>
  <text x="92" y="120" font-size="12" font-weight="600" fill="#d97706">⚠ low sales · high KPI</text>
  <!-- scatter points -->
  <g fill="#2563eb" opacity="0.85">
    <circle cx="340" cy="250" r="8"/><circle cx="395" cy="215" r="8"/><circle cx="440" cy="190" r="8"/>
    <circle cx="470" cy="160" r="8"/><circle cx="520" cy="140" r="8"/><circle cx="365" cy="280" r="8"/>
    <circle cx="300" cy="265" r="8"/><circle cx="500" cy="185" r="8"/><circle cx="545" cy="120" r="8"/>
    <circle cx="420" cy="245" r="8"/><circle cx="265" cy="300" r="8"/><circle cx="225" cy="310" r="8"/>
  </g>
  <g fill="#0d9488" opacity="0.85">
    <circle cx="385" cy="170" r="8"/><circle cx="450" cy="135" r="8"/><circle cx="330" cy="200" r="8"/>
  </g>
  <!-- flagged stores -->
  <g stroke="#dc2626" stroke-width="3" fill="#fee2e2">
    <circle cx="130" cy="140" r="9"/><circle cx="185" cy="165" r="9"/><circle cx="155" cy="185" r="9"/>
  </g>
  <!-- trend line -->
  <line x1="110" y1="320" x2="560" y2="115" stroke="#7c3aed" stroke-width="3" stroke-dasharray="8 6" opacity="0.7"/>
</svg>
