<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="Segoe UI, Arial, sans-serif">
  <rect width="640" height="400" fill="#fafaf9"/>
  <rect width="640" height="48" fill="#ffffff"/>
  <line x1="0" y1="48" x2="640" y2="48" stroke="#e6e4e0" stroke-width="2"/>
  <circle cx="28" cy="24" r="10" fill="#0d9488"/>
  <rect x="48" y="17" width="240" height="14" rx="4" fill="#1c1b1a" opacity="0.85"/>

  <!-- connector arrows -->
  <g stroke="#c8c5bf" stroke-width="3" fill="none">
    <line x1="158" y1="200" x2="178" y2="200"/>
    <line x1="312" y1="200" x2="332" y2="200"/>
    <line x1="466" y1="200" x2="486" y2="200"/>
  </g>

  <!-- step 1: request form -->
  <rect x="24" y="112" width="134" height="176" rx="12" fill="#ffffff" stroke="#e6e4e0"/>
  <circle cx="91" cy="150" r="16" fill="#dbeafe"/>
  <text x="91" y="156" font-size="16" font-weight="700" fill="#2563eb" text-anchor="middle">1</text>
  <rect x="73" y="184" width="36" height="46" rx="3" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <g stroke="#2563eb" stroke-width="2.5" stroke-linecap="round">
    <line x1="80" y1="196" x2="102" y2="196"/><line x1="80" y1="206" x2="102" y2="206"/><line x1="80" y1="216" x2="94" y2="216"/>
  </g>
  <rect x="44" y="244" width="94" height="9" rx="4" fill="#1c1b1a" opacity="0.55"/>
  <rect x="44" y="262" width="64" height="8" rx="4" fill="#6b6964" opacity="0.4"/>

  <!-- step 2: approval -->
  <rect x="178" y="112" width="134" height="176" rx="12" fill="#ffffff" stroke="#e6e4e0"/>
  <circle cx="245" cy="150" r="16" fill="#ede9fe"/>
  <text x="245" y="156" font-size="16" font-weight="700" fill="#7c3aed" text-anchor="middle">2</text>
  <circle cx="245" cy="205" r="22" fill="none" stroke="#7c3aed" stroke-width="2.5"/>
  <path d="M233 205 l8 9 l16 -18" stroke="#7c3aed" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="198" y="244" width="94" height="9" rx="4" fill="#1c1b1a" opacity="0.55"/>
  <rect x="198" y="262" width="64" height="8" rx="4" fill="#6b6964" opacity="0.4"/>

  <!-- step 3: purchase -->
  <rect x="332" y="112" width="134" height="176" rx="12" fill="#ffffff" stroke="#e6e4e0"/>
  <circle cx="399" cy="150" r="16" fill="#ccfbf1"/>
  <text x="399" y="156" font-size="16" font-weight="700" fill="#0d9488" text-anchor="middle">3</text>
  <g fill="none" stroke="#0d9488" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M376 188 h8 l5 30 h22 l5 -22 h-34"/>
  </g>
  <circle cx="392" cy="226" r="4" fill="#0d9488"/><circle cx="412" cy="226" r="4" fill="#0d9488"/>
  <rect x="352" y="244" width="94" height="9" rx="4" fill="#1c1b1a" opacity="0.55"/>
  <rect x="352" y="262" width="64" height="8" rx="4" fill="#6b6964" opacity="0.4"/>

  <!-- step 4: receipt & log (highlighted) -->
  <rect x="486" y="112" width="134" height="176" rx="12" fill="#f0fdfa" stroke="#0d9488" stroke-width="2"/>
  <circle cx="553" cy="150" r="16" fill="#ccfbf1"/>
  <text x="553" y="156" font-size="16" font-weight="700" fill="#0d9488" text-anchor="middle">4</text>
  <rect x="535" y="184" width="36" height="48" rx="2" fill="#ffffff" stroke="#0d9488" stroke-width="2"/>
  <g stroke="#0d9488" stroke-width="2.5" stroke-linecap="round">
    <line x1="542" y1="196" x2="564" y2="196"/><line x1="542" y1="206" x2="564" y2="206"/>
  </g>
  <path d="M548 216 l5 6 l10 -12" stroke="#0d9488" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="506" y="244" width="94" height="9" rx="4" fill="#0d9488" opacity="0.8"/>
  <rect x="506" y="262" width="64" height="8" rx="4" fill="#0d9488" opacity="0.45"/>
</svg>
