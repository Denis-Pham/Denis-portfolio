<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="Segoe UI, Arial, sans-serif">
  <rect width="640" height="400" fill="#fafaf9"/>
  <rect width="640" height="48" fill="#ffffff"/>
  <line x1="0" y1="48" x2="640" y2="48" stroke="#e6e4e0" stroke-width="2"/>
  <circle cx="28" cy="24" r="10" fill="#0d9488"/>
  <rect x="48" y="17" width="230" height="14" rx="4" fill="#1c1b1a" opacity="0.85"/>

  <!-- Bitable: multi-table with linked records -->
  <!-- table A -->
  <rect x="40" y="80" width="250" height="150" rx="10" fill="#ffffff" stroke="#e6e4e0"/>
  <rect x="40" y="80" width="250" height="30" rx="10" fill="#ccfbf1"/>
  <text x="56" y="100" font-size="13" font-weight="700" fill="#0f766e">Objectives</text>
  <g stroke="#eceae6" stroke-width="1.5"><line x1="40" y1="140" x2="290" y2="140"/><line x1="40" y1="170" x2="290" y2="170"/><line x1="40" y1="200" x2="290" y2="200"/><line x1="120" y1="110" x2="120" y2="230"/><line x1="210" y1="110" x2="210" y2="230"/></g>
  <g fill="#6b6964" opacity="0.4"><rect x="52" y="123" width="54" height="9" rx="3"/><rect x="132" y="123" width="60" height="9" rx="3"/><rect x="52" y="153" width="54" height="9" rx="3"/><rect x="132" y="153" width="60" height="9" rx="3"/><rect x="52" y="183" width="54" height="9" rx="3"/><rect x="132" y="183" width="60" height="9" rx="3"/></g>
  <g fill="#0d9488"><rect x="224" y="151" width="40" height="11" rx="5"/><rect x="224" y="181" width="30" height="11" rx="5"/><rect x="224" y="121" width="46" height="11" rx="5"/></g>

  <!-- table B (action plan) -->
  <rect x="360" y="96" width="240" height="120" rx="10" fill="#ffffff" stroke="#e6e4e0"/>
  <rect x="360" y="96" width="240" height="28" rx="10" fill="#dbeafe"/>
  <text x="376" y="115" font-size="13" font-weight="700" fill="#1d4ed8">Action Plan</text>
  <g stroke="#eceae6" stroke-width="1.5"><line x1="360" y1="152" x2="600" y2="152"/><line x1="360" y1="184" x2="600" y2="184"/></g>
  <g fill="#6b6964" opacity="0.4"><rect x="374" y="135" width="120" height="9" rx="3"/><rect x="374" y="166" width="150" height="9" rx="3"/><rect x="374" y="197" width="100" height="9" rx="3"/></g>

  <!-- link line between tables -->
  <g stroke="#7c3aed" stroke-width="2.5" fill="none" stroke-dasharray="5 5">
    <path d="M290 150 C 325 150, 325 156, 360 156"/>
  </g>
  <circle cx="290" cy="150" r="4" fill="#7c3aed"/><circle cx="360" cy="156" r="4" fill="#7c3aed"/>

  <!-- gantt strip (bottom) -->
  <rect x="40" y="252" width="560" height="112" rx="10" fill="#ffffff" stroke="#e6e4e0"/>
  <text x="56" y="276" font-size="12" font-weight="600" fill="#6b6964">Timeline · Gantt</text>
  <g stroke="#f0efec" stroke-width="1.5"><line x1="160" y1="288" x2="160" y2="352"/><line x1="280" y1="288" x2="280" y2="352"/><line x1="400" y1="288" x2="400" y2="352"/><line x1="520" y1="288" x2="520" y2="352"/></g>
  <rect x="70" y="294" width="150" height="14" rx="7" fill="#2563eb"/>
  <rect x="180" y="316" width="170" height="14" rx="7" fill="#7c3aed"/>
  <rect x="320" y="338" width="200" height="14" rx="7" fill="#0d9488"/>
</svg>
