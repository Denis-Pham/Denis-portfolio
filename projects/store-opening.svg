<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="Segoe UI, Arial, sans-serif">
  <rect width="640" height="400" fill="#fafaf9"/>
  <rect width="640" height="48" fill="#ffffff"/>
  <line x1="0" y1="48" x2="640" y2="48" stroke="#e6e4e0" stroke-width="2"/>
  <circle cx="28" cy="24" r="10" fill="#2563eb"/>
  <rect x="48" y="17" width="230" height="14" rx="4" fill="#1c1b1a" opacity="0.85"/>

  <!-- connector arrows -->
  <g stroke="#c8c5bf" stroke-width="3" fill="none">
    <line x1="158" y1="200" x2="178" y2="200"/>
    <line x1="312" y1="200" x2="332" y2="200"/>
    <line x1="466" y1="200" x2="486" y2="200"/>
  </g>

  <!-- step 1: site survey -->
  <rect x="24" y="112" width="134" height="176" rx="12" fill="#ffffff" stroke="#e6e4e0"/>
  <circle cx="91" cy="150" r="16" fill="#dbeafe"/>
  <text x="91" y="156" font-size="16" font-weight="700" fill="#2563eb" text-anchor="middle">1</text>
  <path d="M91 188 q-14 0 -14 16 q0 14 14 26 q14 -12 14 -26 q0 -16 -14 -16z" fill="#2563eb" opacity="0.85"/>
  <circle cx="91" cy="204" r="5" fill="#ffffff"/>
  <rect x="44" y="244" width="94" height="9" rx="4" fill="#1c1b1a" opacity="0.55"/>
  <rect x="44" y="262" width="64" height="8" rx="4" fill="#6b6964" opacity="0.4"/>

  <!-- step 2: fit-out -->
  <rect x="178" y="112" width="134" height="176" rx="12" fill="#ffffff" stroke="#e6e4e0"/>
  <circle cx="245" cy="150" r="16" fill="#ede9fe"/>
  <text x="245" y="156" font-size="16" font-weight="700" fill="#7c3aed" text-anchor="middle">2</text>
  <rect x="221" y="186" width="48" height="34" rx="3" fill="none" stroke="#7c3aed" stroke-width="3"/>
  <line x1="221" y1="200" x2="269" y2="200" stroke="#7c3aed" stroke-width="3"/>
  <rect x="44" y="244" width="94" height="9" rx="4" fill="#1c1b1a" opacity="0.55" transform="translate(154 0)"/>
  <rect x="44" y="262" width="64" height="8" rx="4" fill="#6b6964" opacity="0.4" transform="translate(154 0)"/>

  <!-- step 3: checklist -->
  <rect x="332" y="112" width="134" height="176" rx="12" fill="#ffffff" stroke="#e6e4e0"/>
  <circle cx="399" cy="150" r="16" fill="#ccfbf1"/>
  <text x="399" y="156" font-size="16" font-weight="700" fill="#0d9488" text-anchor="middle">3</text>
  <g stroke="#0d9488" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M377 188 l5 5 l9 -10"/><line x1="398" y1="190" x2="422" y2="190"/>
    <path d="M377 204 l5 5 l9 -10"/><line x1="398" y1="206" x2="422" y2="206"/>
    <path d="M377 220 l5 5 l9 -10"/><line x1="398" y1="222" x2="422" y2="222"/>
  </g>
  <rect x="44" y="244" width="94" height="9" rx="4" fill="#1c1b1a" opacity="0.55" transform="translate(308 0)"/>
  <rect x="44" y="262" width="64" height="8" rx="4" fill="#6b6964" opacity="0.4" transform="translate(308 0)"/>

  <!-- step 4: grand opening (highlighted) -->
  <rect x="486" y="112" width="134" height="176" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <circle cx="553" cy="150" r="16" fill="#fef3c7"/>
  <text x="553" y="156" font-size="16" font-weight="700" fill="#d97706" text-anchor="middle">4</text>
  <!-- store with awning -->
  <rect x="525" y="200" width="56" height="26" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
  <path d="M521 200 l8 -16 h48 l8 16 z" fill="#d97706" opacity="0.85"/>
  <path d="M553 184 l5 -12 l5 12 z" fill="#dc2626"/>
  <rect x="44" y="244" width="94" height="9" rx="4" fill="#d97706" opacity="0.8" transform="translate(462 0)"/>
  <rect x="44" y="262" width="64" height="8" rx="4" fill="#d97706" opacity="0.45" transform="translate(462 0)"/>
</svg>
