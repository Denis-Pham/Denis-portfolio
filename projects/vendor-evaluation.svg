<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="Segoe UI, Arial, sans-serif">
  <rect width="640" height="400" fill="#fafaf9"/>
  <rect width="640" height="48" fill="#ffffff"/>
  <line x1="0" y1="48" x2="640" y2="48" stroke="#e6e4e0" stroke-width="2"/>
  <circle cx="28" cy="24" r="10" fill="#7c3aed"/>
  <rect x="48" y="17" width="250" height="14" rx="4" fill="#1c1b1a" opacity="0.85"/>

  <!-- comparison table panel -->
  <rect x="24" y="72" width="592" height="304" rx="10" fill="#ffffff" stroke="#e6e4e0"/>

  <!-- column headers: criteria | V1 | V2 | V3(winner) -->
  <rect x="40" y="88" width="200" height="40" rx="6" fill="#f5f5f4"/>
  <rect x="56" y="101" width="120" height="13" rx="4" fill="#6b6964" opacity="0.4"/>
  <circle cx="300" cy="108" r="14" fill="#dbeafe"/><text x="300" y="113" font-size="13" font-weight="700" fill="#2563eb" text-anchor="middle">A</text>
  <circle cx="400" cy="108" r="14" fill="#ede9fe"/><text x="400" y="113" font-size="13" font-weight="700" fill="#7c3aed" text-anchor="middle">B</text>
  <!-- winner column highlight -->
  <rect x="470" y="88" width="130" height="272" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <circle cx="535" cy="108" r="14" fill="#dcfce7"/><text x="535" y="113" font-size="13" font-weight="700" fill="#16a34a" text-anchor="middle">C</text>

  <!-- criteria rows -->
  <g font-size="13" fill="#6b6964">
    <text x="56" y="160">Price</text>
    <text x="56" y="200">Quality</text>
    <text x="56" y="240">Lead time</text>
    <text x="56" y="280">Terms</text>
  </g>
  <g stroke="#eceae6" stroke-width="1.5">
    <line x1="40" y1="176" x2="600" y2="176"/>
    <line x1="40" y1="216" x2="600" y2="216"/>
    <line x1="40" y1="256" x2="600" y2="256"/>
  </g>

  <!-- score dots per cell (filled = points earned) -->
  <g>
    <!-- col A -->
    <circle cx="288" cy="156" r="5" fill="#2563eb"/><circle cx="304" cy="156" r="5" fill="#2563eb"/><circle cx="320" cy="156" r="5" fill="#d6d4d0"/>
    <circle cx="288" cy="196" r="5" fill="#2563eb"/><circle cx="304" cy="196" r="5" fill="#d6d4d0"/><circle cx="320" cy="196" r="5" fill="#d6d4d0"/>
    <circle cx="288" cy="236" r="5" fill="#2563eb"/><circle cx="304" cy="236" r="5" fill="#2563eb"/><circle cx="320" cy="236" r="5" fill="#d6d4d0"/>
    <circle cx="288" cy="276" r="5" fill="#2563eb"/><circle cx="304" cy="276" r="5" fill="#d6d4d0"/><circle cx="320" cy="276" r="5" fill="#d6d4d0"/>
    <!-- col B -->
    <circle cx="388" cy="156" r="5" fill="#7c3aed"/><circle cx="404" cy="156" r="5" fill="#7c3aed"/><circle cx="420" cy="156" r="5" fill="#d6d4d0"/>
    <circle cx="388" cy="196" r="5" fill="#7c3aed"/><circle cx="404" cy="196" r="5" fill="#7c3aed"/><circle cx="420" cy="196" r="5" fill="#7c3aed"/>
    <circle cx="388" cy="236" r="5" fill="#7c3aed"/><circle cx="404" cy="236" r="5" fill="#d6d4d0"/><circle cx="420" cy="236" r="5" fill="#d6d4d0"/>
    <circle cx="388" cy="276" r="5" fill="#7c3aed"/><circle cx="404" cy="276" r="5" fill="#7c3aed"/><circle cx="420" cy="276" r="5" fill="#d6d4d0"/>
    <!-- col C (winner) -->
    <circle cx="523" cy="156" r="5" fill="#16a34a"/><circle cx="539" cy="156" r="5" fill="#16a34a"/><circle cx="555" cy="156" r="5" fill="#16a34a"/>
    <circle cx="523" cy="196" r="5" fill="#16a34a"/><circle cx="539" cy="196" r="5" fill="#16a34a"/><circle cx="555" cy="196" r="5" fill="#16a34a"/>
    <circle cx="523" cy="236" r="5" fill="#16a34a"/><circle cx="539" cy="236" r="5" fill="#16a34a"/><circle cx="555" cy="236" r="5" fill="#d6d4d0"/>
    <circle cx="523" cy="276" r="5" fill="#16a34a"/><circle cx="539" cy="276" r="5" fill="#16a34a"/><circle cx="555" cy="276" r="5" fill="#d6d4d0"/>
  </g>

  <!-- winner badge -->
  <g transform="translate(535 326)">
    <path d="M0 -12 l3.5 7 l7.5 1 l-5.5 5.5 l1.5 8 l-7 -4 l-7 4 l1.5 -8 l-5.5 -5.5 l7.5 -1 z" fill="#16a34a"/>
  </g>
  <rect x="56" y="316" width="150" height="12" rx="4" fill="#16a34a" opacity="0.7"/>
  <rect x="56" y="336" width="100" height="9" rx="4" fill="#6b6964" opacity="0.4"/>
</svg>
