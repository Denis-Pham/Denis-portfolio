<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="Segoe UI, Arial, sans-serif">
  <rect width="640" height="400" fill="#fafaf9"/>
  <rect width="640" height="48" fill="#ffffff"/>
  <line x1="0" y1="48" x2="640" y2="48" stroke="#e6e4e0" stroke-width="2"/>
  <circle cx="28" cy="24" r="10" fill="#7c3aed"/>
  <rect x="48" y="17" width="210" height="14" rx="4" fill="#1c1b1a" opacity="0.85"/>

  <!-- connectors: hub → capability nodes -->
  <g stroke="#cfcbe6" stroke-width="2.5" stroke-dasharray="6 6">
    <line x1="320" y1="206" x2="170" y2="128"/>
    <line x1="320" y1="206" x2="470" y2="128"/>
    <line x1="320" y1="206" x2="170" y2="300"/>
    <line x1="320" y1="206" x2="470" y2="300"/>
  </g>

  <!-- node: review & writing (top-left) -->
  <rect x="124" y="100" width="92" height="58" rx="10" fill="#ffffff" stroke="#e6e4e0"/>
  <rect x="150" y="116" width="26" height="30" rx="2" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <g stroke="#2563eb" stroke-width="2" stroke-linecap="round"><line x1="155" y1="124" x2="171" y2="124"/><line x1="155" y1="131" x2="171" y2="131"/><line x1="155" y1="138" x2="166" y2="138"/></g>

  <!-- node: tasks (top-right) -->
  <rect x="424" y="100" width="92" height="58" rx="10" fill="#ffffff" stroke="#e6e4e0"/>
  <g stroke="#0d9488" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M452 120 l4 4 l8 -9"/><line x1="468" y1="120" x2="488" y2="120"/>
    <path d="M452 134 l4 4 l8 -9"/><line x1="468" y1="134" x2="488" y2="134"/>
  </g>

  <!-- node: data (bottom-left) -->
  <rect x="124" y="272" width="92" height="58" rx="10" fill="#ffffff" stroke="#e6e4e0"/>
  <g fill="#d97706"><rect x="150" y="306" width="8" height="14" rx="1"/><rect x="162" y="298" width="8" height="22" rx="1"/><rect x="174" y="290" width="8" height="30" rx="1"/></g>

  <!-- node: chat / assistant (bottom-right) -->
  <rect x="424" y="272" width="92" height="58" rx="10" fill="#ffffff" stroke="#e6e4e0"/>
  <path d="M450 290 h40 a6 6 0 0 1 6 6 v12 a6 6 0 0 1 -6 6 h-26 l-10 8 v-8 a6 6 0 0 1 -6 -6 v-12 a6 6 0 0 1 6 -6 z" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <g fill="#7c3aed"><circle cx="460" cy="302" r="2.5"/><circle cx="470" cy="302" r="2.5"/><circle cx="480" cy="302" r="2.5"/></g>

  <!-- central agent hub -->
  <circle cx="320" cy="206" r="44" fill="#ede9fe" stroke="#7c3aed" stroke-width="2.5"/>
  <path d="M320 178 l7 17 l17 7 l-17 7 l-7 17 l-7 -17 l-17 -7 l17 -7 z" fill="#7c3aed"/>
  <circle cx="320" cy="206" r="44" fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="3 7" opacity="0.6"/>

  <!-- self-hosted on Docker: stacked container layers under the hub -->
  <g>
    <rect x="288" y="286" width="64" height="13" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <rect x="294" y="302" width="52" height="13" rx="3" fill="#eef4ff" stroke="#2563eb" stroke-width="1.5" opacity="0.8"/>
    <rect x="300" y="318" width="40" height="13" rx="3" fill="#f5f8ff" stroke="#2563eb" stroke-width="1.5" opacity="0.6"/>
    <circle cx="297" cy="292.5" r="2.5" fill="#2563eb"/>
  </g>
</svg>
