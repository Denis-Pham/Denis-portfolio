<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Apply saved theme before paint (same pattern as index.html: ?theme > saved > OS) -->
  <script>
    (function () {
      var qs = new URLSearchParams(location.search).get('theme');
      var saved = (qs === 'dark' || qs === 'light') ? qs : localStorage.getItem('theme');
      var dark = saved ? saved === 'dark'
        : window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (dark) document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
  <title>Case study — Denis Pham</title>
  <meta name="description" content="Case study: how the Hasaki KPI System turned 300+ stores of field execution into a real-time performance loop.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="theme-color" content="#2563eb">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Crimson+Pro:wght@600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== Theme tokens — COPY of index.html's :root (keep the two in sync) ===== */
    :root {
      --bg: #f6f5f4;
      --surface: #ffffff;
      --surface-2: #f5f5f4;
      --shadow-1: rgba(0,0,0,0.01) 0 0.2px 1px, rgba(0,0,0,0.02) 0 0.8px 3px, rgba(0,0,0,0.027) 0 2px 8px, rgba(0,0,0,0.04) 0 4px 18px;
      --shadow-2: rgba(0,0,0,0.02) 0 1px 2px, rgba(0,0,0,0.03) 0 4px 8px, rgba(0,0,0,0.04) 0 10px 24px, rgba(0,0,0,0.05) 0 23px 52px;
      --fg: #1c1b1a;
      --muted: #6b6964;
      --soft: #a8a5a0;
      --border: #e6e4e0;
      --border-strong: #d6d4d0;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --accent-dark: #1d4ed8;
      --accent-2: #7c3aed;
      --accent-2-soft: #ede9fe;
      --accent-2-dark: #6d28d9;
      --accent-3: #0d9488;
      --accent-3-soft: #ccfbf1;
      --accent-4: #d97706;
      --accent-4-soft: #fef3c7;
      --surface-glass: rgba(255, 255, 255, 0.84);
      --bg-glass: rgba(246, 245, 244, 0.62);
      --nav-bg: rgba(246, 245, 244, 0.85);
      --hero-top: rgba(255, 255, 255, 0.7);
      --grad-a: #2563eb; --grad-b: #7c3aed;
      --grad-a-strong: #1d4ed8; --grad-b-strong: #6d28d9;
      --cta-glow: 0 0 0 rgba(0,0,0,0);
      --pill-glow: 0 2px 10px rgba(99, 70, 235, 0.25);
      --num-glow: none;
      --dot-idle: #c8c5bf;
      --track-kicker: 0.2em;
      --track-label: 0.08em;
      --font-display: 'Crimson Pro', Georgia, serif;
      --font-body: 'Inter', -apple-system, system-ui, sans-serif;
      --radius-sm: 7px; --radius-md: 10px; --radius-lg: 12px;
      --radius-xl: 16px; --radius-2xl: 20px; --radius-pill: 999px;
      --ease-signature: cubic-bezier(0.22, 1, 0.36, 1);
      --text-kicker: 11px;
      --text-label: 11.5px;
    }
    :root[data-theme="dark"] {
      --bg: #1a1a18;
      --surface: #242321;
      --surface-2: #2c2b28;
      --shadow-1: rgba(0,0,0,0.20) 0 0.2px 1px, rgba(0,0,0,0.24) 0 0.8px 3px, rgba(0,0,0,0.30) 0 2px 8px, rgba(0,0,0,0.36) 0 4px 18px;
      --shadow-2: rgba(0,0,0,0.30) 0 1px 2px, rgba(0,0,0,0.36) 0 4px 8px, rgba(0,0,0,0.44) 0 10px 24px, rgba(0,0,0,0.55) 0 23px 52px;
      --fg: #ededeb;
      --muted: #a4a09a;
      --soft: #6f6c66;
      --border: #36342f;
      --border-strong: #4a4742;
      --accent: #60a5fa;
      --accent-soft: rgba(96, 165, 250, 0.16);
      --accent-dark: #3b82f6;
      --accent-2: #a78bfa;
      --accent-2-soft: rgba(167, 139, 250, 0.16);
      --accent-2-dark: #8b5cf6;
      --accent-3: #2dd4bf;
      --accent-3-soft: rgba(45, 212, 191, 0.16);
      --accent-4: #fbbf24;
      --accent-4-soft: rgba(251, 191, 36, 0.16);
      --surface-glass: rgba(36, 35, 33, 0.84);
      --bg-glass: rgba(26, 26, 24, 0.62);
      --nav-bg: rgba(26, 26, 24, 0.85);
      --hero-top: rgba(255, 255, 255, 0.03);
      --grad-a: #2563eb; --grad-b: #7c3aed;
      --grad-a-strong: #3b82f6; --grad-b-strong: #8b5cf6;
      --cta-glow: 0 0 18px rgba(59, 130, 246, 0.30), 0 0 40px rgba(139, 92, 246, 0.15);
      --pill-glow: 0 2px 10px rgba(0, 0, 0, 0.45), 0 0 16px rgba(96, 165, 250, 0.40);
      --num-glow: 0 0 18px color-mix(in srgb, currentColor 45%, transparent);
      --dot-idle: #4a4742;
    }

    /* ===== Base ===== */
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0; background: var(--bg); color: var(--fg);
      font: 16px/1.65 var(--font-body);
      overflow-x: hidden;
    }
    img { max-width: 100%; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-dark); }
    .dot { color: var(--accent); }
    :is(a, button):focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 4px; }

    /* Pill buttons (subset of index.html) */
    .btn {
      font: inherit; cursor: pointer;
      padding: 11px 24px; border-radius: var(--radius-pill);
      font-weight: 500; font-size: 14px;
      transition: all 0.2s ease;
      display: inline-flex; align-items: center; gap: 8px;
      text-decoration: none;
    }
    .btn:active { transform: translateY(0) scale(0.97); transition-duration: 60ms; }
    .btn:focus-visible { outline-offset: 2px; border-radius: var(--radius-pill); }
    .btn-primary {
      background: linear-gradient(135deg, var(--grad-a), var(--grad-b)); color: #fff; border: 1px solid transparent;
      position: relative; isolation: isolate; overflow: hidden;
      box-shadow: var(--cta-glow);
    }
    .btn-primary::before {
      content: ''; position: absolute; inset: 0; z-index: -1; border-radius: inherit;
      background: linear-gradient(135deg, var(--grad-a-strong), var(--grad-b-strong));
      opacity: 0; transition: opacity 350ms var(--ease-signature);
    }
    .btn-primary:hover::before { opacity: 1; }
    .btn-primary:hover { color: #fff; transform: translateY(-1px); box-shadow: var(--shadow-2), var(--cta-glow); }
    .btn-secondary {
      background: var(--surface); color: var(--fg);
      border: 1px solid var(--border); box-shadow: var(--shadow-1);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    /* Theme + language toggles (same look as index.html) */
    .theme-toggle {
      width: 34px; height: 34px; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid var(--border); border-radius: var(--radius-pill);
      background: var(--surface); color: var(--muted);
      font-size: 15px; line-height: 1; cursor: pointer;
      transition: color 0.2s, border-color 0.2s, transform 0.2s;
    }
    .theme-toggle:hover { color: var(--accent); border-color: var(--accent); transform: translateY(-1px); }
    .lang-toggle {
      display: inline-flex;
      border: 1px solid var(--border); border-radius: var(--radius-pill);
      overflow: hidden; background: var(--surface);
    }
    .lang-toggle button {
      border: 0; background: none; cursor: pointer;
      padding: 5px 11px; font: inherit;
      font-size: 11.5px; font-weight: 700; letter-spacing: 0.5px;
      color: var(--muted);
    }
    .lang-toggle button.active {
      background: linear-gradient(135deg, var(--grad-a), var(--grad-b));
      color: #fff;
    }

    /* ===== Reading columns ===== */
    .cs-col { max-width: 720px; margin: 0 auto; padding: 0 24px; }
    .cs-col--wide { max-width: 960px; }
    .cs-col-inner { max-width: 720px; }

    /* ===== Top bar ===== */
    .cs-topbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--nav-bg); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .cs-topbar-inner {
      max-width: 960px; margin: 0 auto; padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .cs-back { display: inline-flex; align-items: center; gap: 10px; color: var(--fg); font-weight: 500; }
    .cs-back:hover { color: var(--fg); }
    .cs-back-arrow { color: var(--accent); font-size: 18px; transition: transform 0.35s var(--ease-signature); }
    .cs-back:hover .cs-back-arrow { transform: translateX(-3px); }
    .cs-back-name { font-family: var(--font-display); font-weight: 700; font-size: 18px; }
    .cs-topbar-tools { display: flex; align-items: center; gap: 12px; }

    /* ===== Hero ===== */
    .cs-hero { padding: 56px 0 40px; border-bottom: 1px solid var(--border); }
    .cs-eyebrow {
      font-size: var(--text-kicker); letter-spacing: var(--track-kicker); text-transform: uppercase;
      color: var(--accent); font-weight: 700; margin: 0 0 16px;
    }
    .cs-title {
      font-family: var(--font-display); font-weight: 700;
      font-size: clamp(38px, 6vw, 60px); line-height: 1.05; letter-spacing: -0.035em;
      margin: 0 0 18px; text-wrap: balance;
    }
    .cs-subtitle {
      font-family: var(--font-display); font-size: clamp(19px, 2.4vw, 25px); line-height: 1.45;
      letter-spacing: -0.015em; color: var(--muted); margin: 0; max-width: 40ch; text-wrap: pretty;
    }
    .cs-hero .cs-col--wide + .cs-col--wide { margin-top: 34px; }
    .cs-meta { margin-top: 20px; }

    /* ===== Sections ===== */
    .cs-section { padding: 48px 0; }
    .cs-summary { padding-top: 44px; padding-bottom: 8px; }
    .cs-lede {
      font-family: var(--font-display); font-size: clamp(20px, 2.4vw, 26px); line-height: 1.5;
      letter-spacing: -0.01em; color: var(--fg); margin: 0; text-wrap: pretty;
    }
    .cs-sec-head { display: flex; align-items: baseline; gap: 14px; margin: 0 0 20px; }
    .cs-sec-num {
      font-family: var(--font-display); font-weight: 600; font-size: 16px;
      color: var(--accent); font-variant-numeric: tabular-nums; flex: none; padding-top: 2px;
    }
    .cs-sec-title {
      font-family: var(--font-display); font-weight: 600; font-size: clamp(26px, 3.4vw, 36px);
      letter-spacing: -0.02em; line-height: 1.15; margin: 0; text-wrap: balance;
    }
    .cs-para { font-size: 17px; line-height: 1.75; color: var(--fg); margin: 0 0 16px; max-width: 68ch; }
    .cs-para:last-child { margin-bottom: 0; }

    /* ===== Lists ===== */
    .cs-list { list-style: none; padding: 0; margin: 18px 0 0; display: flex; flex-direction: column; gap: 12px; }
    .cs-list li { position: relative; padding-left: 26px; font-size: 16px; line-height: 1.6; color: var(--fg); max-width: 66ch; }
    .cs-list li::before {
      content: ''; position: absolute; left: 4px; top: 9px; width: 8px; height: 8px; border-radius: var(--radius-pill);
      background: linear-gradient(180deg, var(--grad-a), var(--grad-b));
    }
    .cs-list--constraints li::before { background: var(--accent-4); border-radius: 2px; }

    /* ===== Figures / grids ===== */
    .cs-decisions { margin-top: 6px; }
    .cs-figs { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 26px; }
    .cs-beforeafters { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 24px; }
    .cs-metrics { margin-top: 16px; }
    .cs-lessons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 24px; }

    /* ===== Pipeline stepper ===== */
    .cs-pipeline { list-style: none; display: flex; flex-wrap: wrap; align-items: stretch; gap: 10px; padding: 0; margin: 24px 0 0; }
    .cs-pipe-step {
      position: relative; display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
      padding: 12px 16px; box-shadow: var(--shadow-1); flex: 1 1 auto; min-width: 0;
    }
    .cs-pipe-num {
      flex: none; width: 24px; height: 24px; border-radius: var(--radius-pill);
      display: flex; align-items: center; justify-content: center;
      background: color-mix(in srgb, var(--pipe) 16%, transparent); color: var(--pipe);
      font-weight: 700; font-size: 13px;
    }
    .cs-pipe-label { font-size: 13.5px; font-weight: 500; color: var(--fg); }
    .cs-pipe-arrow { position: absolute; right: -14px; top: 50%; transform: translateY(-50%); color: var(--soft); font-size: 16px; z-index: 1; }

    /* ===== Case-study meta grid ===== */
    .dp-csmeta {
      display: grid; gap: 0;
      background: var(--surface-glass);
      border: 1px solid var(--border); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-1); overflow: hidden;
      margin: 0;
    }
    .dp-csmeta__cell { padding: 16px 18px; border-left: 1px solid var(--border); border-top: 1px solid var(--border); }
    .dp-csmeta__label {
      font-size: var(--text-label); letter-spacing: var(--track-label); text-transform: uppercase;
      color: var(--muted); font-weight: 600; margin: 0 0 6px;
    }
    .dp-csmeta__value { font-size: 14.5px; color: var(--fg); font-weight: 500; line-height: 1.45; margin: 0; }
    .dp-csmeta__value .pending { color: var(--soft); font-style: italic; font-weight: 400; }

    /* ===== Figure (framed image; dashed empty state when src missing) ===== */
    .dp-figure { margin: 0; }
    .dp-figure__frame {
      position: relative; overflow: hidden;
      background: var(--surface-2);
      border: 1px solid var(--border); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-1);
    }
    .dp-figure__frame img { display: block; width: 100%; height: 100%; object-fit: cover; }
    .dp-figure__empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; text-align: center; padding: 24px;
      border: 1px dashed var(--border-strong); border-radius: var(--radius-lg);
      background: repeating-linear-gradient(135deg, var(--surface-2) 0 10px, transparent 10px 20px);
      color: var(--soft);
    }
    .dp-figure__empty-glyph { font-size: 22px; opacity: 0.7; }
    .dp-figure__empty-label { font-size: 13px; font-weight: 500; color: var(--muted); }
    .dp-figure__caption { margin-top: 10px; font-size: 13px; line-height: 1.5; color: var(--muted); }

    /* ===== Before → After ===== */
    .dp-ba {
      display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 18px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 20px 22px; box-shadow: var(--shadow-1);
    }
    .dp-ba__side { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .dp-ba__tag { font-size: var(--text-label); letter-spacing: var(--track-label); text-transform: uppercase; font-weight: 600; }
    .dp-ba__tag--before { color: var(--soft); }
    .dp-ba__tag--after { color: var(--ba-accent, var(--accent)); }
    .dp-ba__val { font-family: var(--font-display); font-size: clamp(22px, 2.6vw, 30px); line-height: 1.1; letter-spacing: -0.02em; }
    .dp-ba__val--before { color: var(--muted); text-decoration: line-through; text-decoration-color: var(--border-strong); }
    .dp-ba__val--after { color: var(--fg); }
    .dp-ba__val--after b { color: var(--ba-accent, var(--accent)); font-weight: inherit; text-shadow: var(--num-glow); }
    .dp-ba__arrow { color: var(--ba-accent, var(--accent)); font-size: 22px; line-height: 1; }
    .dp-ba__note { grid-column: 1 / -1; font-size: 13px; color: var(--muted); margin: 2px 0 0; }
    @media (max-width: 520px) {
      .dp-ba { grid-template-columns: 1fr; text-align: left; }
      .dp-ba__arrow { transform: rotate(90deg); justify-self: start; }
    }

    /* ===== Design decision ===== */
    .dp-decision { display: grid; grid-template-columns: auto 1fr; gap: 16px; padding: 20px 0; border-top: 1px solid var(--border); }
    .dp-decision:first-child { border-top: none; padding-top: 0; }
    .dp-decision__num {
      font-family: var(--font-display); font-weight: 600; font-size: 20px; line-height: 1;
      color: var(--accent); width: 40px; height: 40px; border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      background: var(--accent-soft); flex: none;
    }
    .dp-decision__title { font-size: 17px; font-weight: 600; color: var(--fg); margin: 4px 0 8px; letter-spacing: -0.01em; font-family: var(--font-body); }
    .dp-decision__why { color: var(--muted); font-size: 15px; line-height: 1.65; margin: 0; max-width: 64ch; }
    .dp-decision__tradeoff {
      margin-top: 10px; font-size: 13.5px; color: var(--muted);
      padding: 8px 12px; background: var(--surface-2); border-radius: var(--radius-sm);
      border-left: 2px solid var(--accent-4);
    }
    .dp-decision__tradeoff b { color: var(--accent-4); font-weight: 600; text-transform: uppercase; letter-spacing: var(--track-label); font-size: 11px; }

    /* ===== Pull quote / lessons ===== */
    .dp-quote { font-family: var(--font-display); margin: 0; padding: 4px 0 4px 24px; border-left: 3px solid var(--accent); }
    .dp-quote__text {
      font-size: clamp(20px, 2.4vw, 26px); line-height: 1.4;
      letter-spacing: -0.015em; color: var(--fg); font-weight: 500; text-wrap: pretty; margin: 0;
    }
    .dp-quote__cite {
      display: block; margin-top: 14px;
      font-family: var(--font-body); font-size: 13px; font-weight: 600;
      letter-spacing: var(--track-label); text-transform: uppercase; color: var(--muted); font-style: normal;
    }
    .dp-quote__cite::before { content: '— '; color: var(--soft); }
    .dp-lesson {
      display: grid; grid-template-columns: auto 1fr; gap: 14px; align-items: start;
      padding: 16px 18px; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-md); box-shadow: var(--shadow-1);
    }
    .dp-lesson__mark {
      flex: none; width: 26px; height: 26px; border-radius: var(--radius-pill);
      display: flex; align-items: center; justify-content: center;
      background: var(--accent-3-soft); color: var(--accent-3);
      font-size: 14px; font-weight: 700;
    }
    .dp-lesson__title { font-size: 15px; font-weight: 600; color: var(--fg); margin: 2px 0 4px; }
    .dp-lesson__body { font-size: 14px; color: var(--muted); line-height: 1.6; margin: 0; }

    /* ===== Foot: next project + contact ===== */
    .cs-foot { border-top: 1px solid var(--border); background: var(--surface-glass); }
    .dp-nextproj {
      display: flex; align-items: center; justify-content: space-between; gap: 20px;
      padding: 26px 28px; color: var(--fg);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-xl); box-shadow: var(--shadow-1);
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .dp-nextproj:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: var(--shadow-2); color: var(--fg); }
    .dp-nextproj__eyebrow { display: block; font-size: var(--text-label); letter-spacing: var(--track-label); text-transform: uppercase; color: var(--accent); font-weight: 600; margin: 0 0 6px; }
    .dp-nextproj__title { font-family: var(--font-display); font-weight: 600; font-size: clamp(20px, 2.4vw, 26px); letter-spacing: -0.02em; margin: 0; }
    .dp-nextproj__arrow { font-size: 26px; color: var(--accent); flex: none; transition: transform 0.35s var(--ease-signature); }
    .dp-nextproj:hover .dp-nextproj__arrow { transform: translateX(4px); }
    .cs-contact { margin-top: 30px; text-align: center; }
    .cs-contact-line { color: var(--muted); font-size: 15px; margin: 0 0 18px; }
    .cs-contact-line a { font-weight: 600; }
    .cs-contact-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    .cs-empty { min-height: 60vh; display: flex; align-items: center; justify-content: center; font-size: 18px; }

    /* ===== Responsive ===== */
    @media (max-width: 780px) {
      .cs-figs, .cs-beforeafters { grid-template-columns: 1fr; }
      .cs-lessons { grid-template-columns: 1fr; }
      .cs-pipe-arrow { display: none; }
      .dp-csmeta { grid-template-columns: 1fr 1fr !important; }
    }
    @media (max-width: 600px) {
      .cs-hero { padding: 36px 0 28px; }
      .cs-section { padding: 36px 0; }
      .cs-sec-head { gap: 10px; }
    }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      .cs-back-arrow, .dp-nextproj, .dp-nextproj__arrow { transition: none; }
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- ===== TOP BAR ===== -->
  <header class="cs-topbar">
    <div class="cs-topbar-inner">
      <a class="cs-back" href="index.html">
        <span class="cs-back-arrow" aria-hidden="true">←</span>
        <span class="cs-back-name"><span id="cs-back-name">Denis Pham</span><span class="dot">.</span></span>
      </a>
      <div class="cs-topbar-tools">
        <button type="button" class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode"></button>
